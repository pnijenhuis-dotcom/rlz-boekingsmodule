# Lokale dev-pariteit met productie (Cloud SQL for PostgreSQL 16 — koppelcontract v1.2).
# Op deze ontwikkelmachine draait i.p.v. dit compose-bestand een losse Homebrew PG16-cluster op
# poort 5433 (Docker niet geïnstalleerd, zie backend/README.md) — dit bestand is voor andere
# devs/CI die wél Docker gebruiken; poort en credentials zijn met opzet identiek aan
# backend/.env.example, zodat beide paden zonder aanpassing naast elkaar werken.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: boekhouding
      # Alleen lokale dev; productie gebruikt Cloud SQL zonder wachtwoordloze superuser.
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d boekhouding"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
